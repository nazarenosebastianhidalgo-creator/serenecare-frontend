<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LexAI · Probar a Sofía</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<style>
  body{font-family:'Inter',sans-serif;background:#0b1326;color:#dae2fd;}
  .material-symbols-outlined{font-family:'Material Symbols Outlined';}
  .pulse{animation:p 1.4s ease-in-out infinite}@keyframes p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
  .seg.active{background:#4fdbc8;color:#003731;}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md text-center">
<div class="flex items-center gap-3 mb-8 justify-center">
<div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:#4fdbc8;color:#003731;"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">gavel</span></div>
<div class="text-left"><div class="text-2xl font-bold" style="color:#4fdbc8;">LexAI</div><div class="text-xs tracking-widest" style="color:#bbcac6;font-family:'JetBrains Mono';">PROBAR A SOFÍA</div></div>
</div>

<div class="p-8 rounded-2xl border" style="background:#171f33;border-color:#3c4947;">
<h1 class="text-xl font-semibold mb-1">Habla con la recepcionista IA</h1>
<p class="text-sm mb-6" style="color:#bbcac6;">Pulsa, permite el micrófono y habla como si llamaras al despacho. Prueba: <em>"Hola, quería información para una consulta de divorcio."</em></p>

<div class="mb-6">
<div class="text-xs mb-2" style="color:#bbcac6;">Elige la voz a probar</div>
<div class="inline-flex rounded-full p-1 border" style="border-color:#3c4947;background:#0b1326;">
<button id="v-human" class="seg active px-4 py-2 rounded-full text-sm font-semibold">Humana (ElevenLabs)</button>
<button id="v-azure" class="seg px-4 py-2 rounded-full text-sm font-semibold" style="color:#bbcac6;">Española (Azure)</button>
</div>
</div>

<button id="btn" class="w-28 h-28 mx-auto rounded-full flex flex-col items-center justify-center gap-1 font-bold text-lg transition" style="background:#4fdbc8;color:#003731;">
<span class="material-symbols-outlined" style="font-size:34px;">call</span>
<span id="btn-txt" class="text-sm">Llamar</span>
</button>

<div id="estado" class="mt-6 text-sm" style="color:#bbcac6;">Listo para llamar</div>
</div>
<p class="text-center text-xs mt-6" style="color:#859490;">Demo · Recepcionista IA para despachos</p>
</div>

<script type="module">
import Vapi from "https://esm.sh/@vapi-ai/web@2";
const PUBLIC_KEY = "77bbbdc8-f5c0-4203-b43e-b7959803b497";
const ASSISTANTS = {
  human: "21d368e8-ba1d-4854-8b72-d807d4307784",
  azure: "95a451c3-45a6-4dc4-b28f-cabeed5c8f19",
};
let voz = "human", enLlamada = false;
const vapi = new Vapi(PUBLIC_KEY);
const btn = document.getElementById('btn'), btnTxt = document.getElementById('btn-txt'), estado = document.getElementById('estado');
const setEstado = (t,c='#bbcac6') => { estado.textContent = t; estado.style.color = c; };

document.getElementById('v-human').onclick = () => selVoz('human');
document.getElementById('v-azure').onclick = () => selVoz('azure');
function selVoz(v){ if(enLlamada) return; voz=v;
  document.getElementById('v-human').classList.toggle('active', v==='human');
  document.getElementById('v-azure').classList.toggle('active', v==='azure');
  document.getElementById('v-human').style.color = v==='human' ? '#003731' : '#bbcac6';
  document.getElementById('v-azure').style.color = v==='azure' ? '#003731' : '#bbcac6';
}

btn.onclick = async () => {
  if(!enLlamada){
    try { setEstado('Conectando… permite el micrófono'); await vapi.start(ASSISTANTS[voz]); }
    catch(e){ setEstado('No se pudo iniciar la llamada. Revisa el micrófono.', '#ffb4ab'); }
  } else { vapi.stop(); }
};

vapi.on('call-start', () => { enLlamada = true; btn.style.background='#ff7b88'; btn.classList.add('pulse');
  btn.querySelector('.material-symbols-outlined').textContent='call_end'; btnTxt.textContent='Colgar'; setEstado('En llamada — habla con Sofía 🎙️', '#4fdbc8'); });
vapi.on('call-end', () => { enLlamada = false; btn.style.background='#4fdbc8'; btn.classList.remove('pulse');
  btn.querySelector('.material-symbols-outlined').textContent='call'; btnTxt.textContent='Llamar'; setEstado('Llamada terminada. La verás en el panel en unos segundos.'); });
vapi.on('speech-start', () => setEstado('Sofía está hablando…', '#4fdbc8'));
vapi.on('speech-end', () => { if(enLlamada) setEstado('Te escucha… habla', '#bbcac6'); });
vapi.on('error', (e) => { setEstado('Error en la llamada: ' + (e?.error?.message || e?.message || 'desconocido'), '#ffb4ab'); enLlamada=false; btn.style.background='#4fdbc8'; btn.classList.remove('pulse'); btn.querySelector('.material-symbols-outlined').textContent='call'; btnTxt.textContent='Llamar'; });
</script>
</body></html>
