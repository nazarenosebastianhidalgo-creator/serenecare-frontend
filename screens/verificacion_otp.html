<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md mx-auto flex flex-col items-center space-y-10">

<div class="flex items-center space-x-3 group">
<div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center text-on-primary shadow-[0_10px_20px_rgba(41,103,119,0.15)]">

</div>
<span class="font-display text-2xl font-extrabold tracking-tight text-on-surface">SereneCare</span>

<div class="text-center space-y-3">
<h1 class="font-display text-2xl font-bold tracking-tight text-on-surface leading-tight px-4">
                    Hemos enviado un código a tu móvil <span class="whitespace-nowrap font-mono text-primary">• • • • • • 4 7</span>
</h1>
<p class="font-body text-on-surface-variant text-sm px-6">
                    Introduce el código de 6 dígitos que has recibido por WhatsApp
                </p>
</div>
</header>
<main class="w-full space-y-8">
<form class="space-y-8">
<div class="flex justify-center gap-2 md:gap-3">
<input autofocus="" class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-12 h-12 md:w-16 md:h-16 text-center text-2xl font-bold rounded-xl border-none bg-surface-container-low text-on-surface transition-all duration-200 focus:bg-surface-container-lowest" maxlength="1" placeholder="•" type="text"/>
</div>
<div class="flex flex-col items-center space-y-2">
<div class="flex items-center space-x-2 text-primary font-medium text-sm">
<span class="material-symbols-outlined text-lg">timer</span>
<span>El código expira en 4:32</span>
</div>
</div>
<div class="space-y-4">
<button class="w-full h-14 bg-surface-container-highest text-on-surface-variant font-display font-bold rounded-2xl cursor-not-allowed opacity-60 transition-all duration-300" disabled="" type="submit">
                        Verificar código
                    </button>
<div class="flex flex-col items-center space-y-6">
<div class="flex items-center space-x-2 text-sm">
<span class="text-on-surface-variant">No he recibido el código</span>
<span class="text-outline-variant">•</span>
<button class="text-primary font-semibold hover:text-primary-dim transition-colors flex items-center space-x-2" type="button">
<span>Reenviar</span>
<svg class="animate-spin h-4 w-4 text-primary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
</button>
</div>
<a class="inline-flex items-center space-x-2 px-6 py-3 rounded-full bg-surface-container-low text-secondary font-semibold text-sm hover:bg-surface-container-high transition-all" href="#">

</main>
<footer class="pt-8 opacity-40">
<div class="h-[2px] w-12 bg-outline-variant rounded-full mx-auto"></div>
</footer>
</div>
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary-container/20 blur-[120px]"></div>
</div>

  <!-- Error Message -->
  <div id="error-msg" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-error text-on-error px-6 py-3 rounded-full font-semibold text-sm shadow-lg z-50"></div>

  <script type="module">
    import { verificarOTP, enviarOTP, redirigirPorRol, mostrarError, setBotonCargando } from '../js/auth.js'

    // Inputs OTP: avanzar al siguiente campo automáticamente
    const inputs = document.querySelectorAll('input[maxlength="1"], input[type="text"][class*="text-center"]')
    inputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        if (input.value && i < inputs.length - 1) inputs[i + 1].focus()
      })
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus()
      })
    })

    // Botón verificar
    const btnVerificar = document.querySelector('button[type="submit"]') 
      || document.querySelector('button.primary-gradient')
      || document.querySelector('button')

    btnVerificar.addEventListener('click', async (e) => {
      e.preventDefault()
      const token = Array.from(inputs).map(i => i.value).join('')

      if (token.length < 6) { mostrarError('Ingresá el código completo de 6 dígitos.'); return }

      setBotonCargando(btnVerificar, true)
      try {
        const perfil = await verificarOTP(token)
        redirigirPorRol(perfil.rol)
      } catch (err) {
        mostrarError(err.message)
      } finally {
        setBotonCargando(btnVerificar, false)
      }
    })

    // Reenviar código
    const btnReenviar = document.querySelector('button[type="button"]') 
      || Array.from(document.querySelectorAll('button')).find(b => b.textContent.toLowerCase().includes('reenviar') || b.textContent.toLowerCase().includes('resend'))

    if (btnReenviar) {
      btnReenviar.addEventListener('click', async () => {
        const email = sessionStorage.getItem('tp_otp_email')
        if (!email) { mostrarError('Sesión expirada. Volvé al login.'); return }
        try {
          await enviarOTP(email)
          btnReenviar.textContent = 'Código reenviado ✓'
          setTimeout(() => { btnReenviar.textContent = 'Reenviar código' }, 3000)
        } catch (err) {
          mostrarError(err.message)
        }
      })
    }
  </script>
