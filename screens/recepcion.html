<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SereneCare — Recepción</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#020617; font-family:'Inter',sans-serif; color:#e2e8f0; height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }
  .card { width:100%; max-width:440px; height:min(680px,95vh); background:#0a1628; border:1px solid rgba(255,255,255,0.06); border-radius:22px; display:flex; flex-direction:column; overflow:hidden; }
  .hd { padding:18px 20px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:12px; }
  .avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#2dd4bf,#0f766e); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .hd h1 { font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; margin:0; color:#f1f5f9; }
  .hd p { font-size:12px; color:#5eead4; margin:2px 0 0; }
  .msgs { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .m { max-width:82%; padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.45; white-space:pre-wrap; }
  .m.bot { background:rgba(255,255,255,0.05); border-bottom-left-radius:4px; align-self:flex-start; }
  .m.user { background:#2dd4bf; color:#022c22; border-bottom-right-radius:4px; align-self:flex-end; font-weight:500; }
  .typing { align-self:flex-start; color:#64748b; font-size:13px; padding:4px 14px; }
  .ok { align-self:center; background:rgba(45,212,191,0.1); border:1px solid rgba(45,212,191,0.25); color:#5eead4; font-size:12px; padding:6px 14px; border-radius:20px; }
  .inp { padding:14px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:10px; }
  .inp input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 14px; color:#e2e8f0; font-family:inherit; font-size:14px; outline:none; }
  .inp input:focus { border-color:#2dd4bf; }
  .inp button { background:#2dd4bf; color:#022c22; border:none; border-radius:12px; width:46px; font-size:18px; cursor:pointer; flex-shrink:0; }
  .inp button:disabled { opacity:.5; cursor:default; }
  .center { margin:auto; text-align:center; padding:40px 24px; color:#94a3b8; }
</style>
</head>
<body>
  <div class="card">
    <div class="hd">
      <div class="avatar">💬</div>
      <div>
        <h1 id="titulo">Recepción</h1>
        <p id="sub">En línea</p>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inp" id="barra" style="display:none">
      <input id="txt" placeholder="Escribe tu mensaje…" autocomplete="off" />
      <button id="send" onclick="enviar()">➤</button>
    </div>
  </div>

<script>
var API = '';  // relativo: usa el rewrite /api -> backend
var psi = new URLSearchParams(location.search).get('psi');
var historia = [];   // [{role, content}]
var enviando = false;

var elMsgs = document.getElementById('msgs');
function burbuja(texto, clase) {
  var d = document.createElement('div'); d.className = 'm ' + clase; d.textContent = texto;
  elMsgs.appendChild(d); elMsgs.scrollTop = elMsgs.scrollHeight; return d;
}
function chip(texto) {
  var d = document.createElement('div'); d.className = 'ok'; d.textContent = texto;
  elMsgs.appendChild(d); elMsgs.scrollTop = elMsgs.scrollHeight;
}

async function init() {
  if (!psi) { elMsgs.innerHTML = '<div class="center">Enlace no válido.</div>'; return; }
  try {
    var r = await fetch(API + '/api/recepcion/' + psi + '/config');
    if (!r.ok) { elMsgs.innerHTML = '<div class="center">La recepción no está disponible ahora mismo.</div>'; return; }
    var cfg = await r.json();
    document.getElementById('titulo').textContent = cfg.psicologo || 'Recepción';
    var bienvenida = cfg.mensaje_bienvenida || ('¡Hola! Soy la recepción de ' + (cfg.psicologo || 'la consulta') + '. ¿En qué puedo ayudarte?');
    historia.push({ role: 'assistant', content: bienvenida });
    burbuja(bienvenida, 'bot');
    document.getElementById('barra').style.display = 'flex';
    document.getElementById('txt').focus();
  } catch (e) { elMsgs.innerHTML = '<div class="center">No se pudo cargar la recepción.</div>'; }
}

async function enviar() {
  var input = document.getElementById('txt');
  var texto = input.value.trim();
  if (!texto || enviando) return;
  enviando = true; document.getElementById('send').disabled = true;
  input.value = '';
  burbuja(texto, 'user');
  historia.push({ role: 'user', content: texto });

  var typing = document.createElement('div'); typing.className = 'typing'; typing.textContent = 'escribiendo…';
  elMsgs.appendChild(typing); elMsgs.scrollTop = elMsgs.scrollHeight;

  try {
    var r = await fetch(API + '/api/recepcion/' + psi + '/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: historia })
    });
    typing.remove();
    var d = await r.json();
    var reply = d.reply || 'Perdona, ¿me lo repites?';
    historia.push({ role: 'assistant', content: reply });
    burbuja(reply, 'bot');
    if (d.capturada) chip('✓ Consulta enviada al psicólogo');
  } catch (e) {
    typing.remove();
    burbuja('Ups, algo falló. Inténtalo de nuevo.', 'bot');
  } finally {
    enviando = false; document.getElementById('send').disabled = false; input.focus();
  }
}

document.getElementById('txt').addEventListener('keydown', function(e){ if (e.key === 'Enter') enviar(); });
init();
</script>
</body>
</html>
