<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SereneCare — Nueva cita</title>
<link rel="stylesheet" href="/css/tailwind.css">
<script>window.tailwind=window.tailwind||{};</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#020617 0%,#0a0a1f 60%,#020617 100%); }
  h1,h2 { font-family:'Manrope',sans-serif; }
  .field { width:100%; padding:12px 14px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#e2e8f0; font-size:14px; outline:none; transition:border-color .15s, box-shadow .15s; box-sizing:border-box; }
  .field:focus { border-color:rgba(139,92,246,0.5); box-shadow:0 0 0 2px rgba(139,92,246,0.12); }
  .field option { background:#0d1b2e; color:#e2e8f0; }
  .lbl { display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="fixed top-0 right-0 w-96 h-96 rounded-full opacity-20 pointer-events-none" style="background:radial-gradient(circle,rgba(139,92,246,0.25) 0%,transparent 70%);"></div>
  <div class="fixed bottom-0 left-0 w-80 h-80 rounded-full opacity-15 pointer-events-none" style="background:radial-gradient(circle,rgba(109,40,217,0.2) 0%,transparent 70%);"></div>

  <div class="w-full max-w-lg relative z-10">

    <div class="rounded-3xl p-8 backdrop-blur-sm" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">

      <div class="flex items-start justify-between mb-7">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl flex items-center justify-center" style="background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);">
            <span class="material-symbols-outlined" style="color:#a78bfa;font-variation-settings:'FILL' 1;">event</span>
          </div>
          <div>
            <h2 class="text-xl font-extrabold text-white">Nueva cita</h2>
            <p class="text-xs text-slate-500 mt-0.5">Agenda una sesión con tu paciente</p>
          </div>
        </div>
        <a href="agenda_psicologo.html" class="w-8 h-8 rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors" style="text-decoration:none;">
          <span class="material-symbols-outlined text-slate-400 text-lg">close</span>
        </a>
      </div>

      <form id="form-cita" class="space-y-4" novalidate>

        <div>
          <label class="lbl">Paciente <span style="color:#f87171;">*</span></label>
          <select id="np-paciente" class="field"><option value="">Cargando…</option></select>
        </div>

        <div>
          <label class="lbl">Psicólogo <span style="color:#f87171;">*</span></label>
          <select id="np-psicologo" class="field"><option value="">Cargando…</option></select>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="lbl">Fecha <span style="color:#f87171;">*</span></label>
            <input id="np-fecha" type="date" class="field"/>
          </div>
          <div>
            <label class="lbl">Inicio <span style="color:#f87171;">*</span></label>
            <input id="np-hora-inicio" type="time" class="field" value="10:00"/>
          </div>
          <div>
            <label class="lbl">Fin</label>
            <input id="np-hora-fin" type="time" class="field" value="10:50"/>
          </div>
        </div>

        <div>
          <label class="lbl">Tipo de sesión</label>
          <select id="np-tipo" name="tipo" class="field">
            <option value="presencial">Presencial</option>
            <option value="online">Telemedicina (online)</option>
          </select>
        </div>

        <div id="error-msg" class="hidden py-3 px-4 rounded-xl text-sm font-medium" style="background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);"></div>
        <div id="success-msg" class="hidden py-3 px-4 rounded-xl text-sm font-medium" style="background:rgba(52,211,153,0.12);color:#6ee7b7;border:1px solid rgba(52,211,153,0.25);"></div>

        <div class="flex gap-3 pt-2">
          <a href="agenda_psicologo.html" class="flex-1 py-3.5 rounded-xl font-bold text-sm text-center text-slate-400 hover:bg-white/5 transition-all" style="border:1px solid rgba(255,255,255,0.08);text-decoration:none;">Cancelar</a>
          <button type="submit" id="btn-guardar" class="flex-[2] py-3.5 rounded-xl font-bold text-sm text-white flex items-center justify-center gap-2 transition-all hover:brightness-110 active:scale-95" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 4px 20px rgba(124,58,237,0.35);">
            <span class="material-symbols-outlined text-base">check_circle</span>
            Agendar cita
          </button>
        </div>

      </form>
    </div>
  </div>

  <script type="module">
    import { guardaClinica, crearCita, obtenerPacientes, obtenerStaff } from '../js/clinica.js'

    function mostrar(id, msg) {
      const el = document.getElementById(id)
      el.textContent = msg; el.classList.remove('hidden')
      document.getElementById(id === 'error-msg' ? 'success-msg' : 'error-msg').classList.add('hidden')
    }

    ;(async () => {
      await guardaClinica()

      const selPac = document.getElementById('np-paciente')
      const selPsi = document.getElementById('np-psicologo')

      // Poblar pacientes y psicólogos de la clínica
      const [pacientes, staff] = await Promise.all([obtenerPacientes(), obtenerStaff()])

      selPac.innerHTML = '<option value="">— Selecciona un paciente —</option>' +
        (pacientes || []).map(p => `<option value="${p.id}">${(p.apellido||'')}, ${(p.nombre||'')}</option>`).join('')

      const psicologos = (staff || []).filter(s => s.rol === 'psicologo')
      const miId = localStorage.getItem('tp_user_id')
      selPsi.innerHTML = '<option value="">— Selecciona un psicólogo —</option>' +
        psicologos.map(p => `<option value="${p.id}" ${p.id === miId ? 'selected' : ''}>${(p.nombre||'')} ${(p.apellido||'')}</option>`).join('')

      // Fecha por defecto: hoy
      document.getElementById('np-fecha').value = new Date().toISOString().split('T')[0]

      document.getElementById('form-cita').addEventListener('submit', async (e) => {
        e.preventDefault()
        const datos = {
          paciente_id:  selPac.value,
          psicologo_id: selPsi.value,
          fecha:        document.getElementById('np-fecha').value,
          hora_inicio:  document.getElementById('np-hora-inicio').value,
          tipo:         document.getElementById('np-tipo').value,
          estado:       'programada',
        }
        const fin = document.getElementById('np-hora-fin').value
        if (fin) datos.hora_fin = fin

        if (!datos.paciente_id || !datos.psicologo_id || !datos.fecha || !datos.hora_inicio) {
          mostrar('error-msg', 'Completa paciente, psicólogo, fecha y hora.'); return
        }

        const btn = document.getElementById('btn-guardar')
        btn.disabled = true; btn.style.opacity = '0.6'
        try {
          await crearCita(datos)
          mostrar('success-msg', 'Cita creada correctamente. Volviendo a la agenda…')
          setTimeout(() => { location.href = 'agenda_psicologo.html' }, 1200)
        } catch (err) {
          mostrar('error-msg', err.message || 'No se pudo crear la cita.')
          btn.disabled = false; btn.style.opacity = '1'
        }
      })
    })()
  </script>
</body>
</html>
