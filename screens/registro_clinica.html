<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SereneCare — Crear cuenta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Manrope', sans-serif; }
    .gradient { background: linear-gradient(135deg, #020617 0%, #0a1628 60%, #020617 100%); }
    .teal-glow { box-shadow: 0 0 40px rgba(45,212,191,0.12); }
  </style>
</head>
<body class="min-h-screen gradient flex items-center justify-center p-6 py-12">

  <!-- Orbes decorativos -->
  <div class="fixed top-0 right-0 w-96 h-96 rounded-full opacity-20 pointer-events-none"
       style="background:radial-gradient(circle,rgba(45,212,191,0.25) 0%,transparent 70%);"></div>
  <div class="fixed bottom-0 left-0 w-80 h-80 rounded-full opacity-15 pointer-events-none"
       style="background:radial-gradient(circle,rgba(20,184,166,0.2) 0%,transparent 70%);"></div>

  <div class="w-full max-w-lg relative z-10">

    <!-- Logo + título -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 teal-glow"
           style="background:rgba(45,212,191,0.15);border:1px solid rgba(45,212,191,0.3);">
        <span class="material-symbols-outlined text-4xl" style="color:#2dd4bf;font-variation-settings:'FILL' 1;">medical_services</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">Crear tu clínica</h1>
      <p class="text-slate-400 mt-1 text-sm">14 días gratis · Sin tarjeta al registrarte</p>
    </div>

    <!-- Card principal -->
    <div class="rounded-3xl p-8 backdrop-blur-sm" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">

      <!-- Plan destacado -->
      <div class="rounded-2xl p-4 mb-6 flex items-center justify-between"
           style="background:rgba(45,212,191,0.08);border:1px solid rgba(45,212,191,0.25);">
        <div>
          <div class="text-xs font-bold uppercase tracking-wider mb-0.5" style="color:#2dd4bf;">Plan Fundadores</div>
          <div class="text-slate-400 text-xs">Precio bloqueado para siempre · Solo primeras plazas</div>
        </div>
        <div class="text-right">
          <div class="text-2xl font-extrabold text-white">€29<span class="text-sm font-normal text-slate-400">/mes</span></div>
        </div>
      </div>

      <!-- Formulario -->
      <form id="form-registro" class="space-y-4" novalidate>

        <!-- Nombre + Apellido -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-slate-400 block mb-1.5">Nombre</label>
            <input id="nombre" type="text" placeholder="Ana" required
              class="w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm transition-all focus:outline-none"
              style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);"
              onfocus="this.style.borderColor='rgba(45,212,191,0.5)';this.style.boxShadow='0 0 0 2px rgba(45,212,191,0.12)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.12)';this.style.boxShadow='none'"/>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-400 block mb-1.5">Apellido</label>
            <input id="apellido" type="text" placeholder="García" required
              class="w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm transition-all focus:outline-none"
              style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);"
              onfocus="this.style.borderColor='rgba(45,212,191,0.5)';this.style.boxShadow='0 0 0 2px rgba(45,212,191,0.12)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.12)';this.style.boxShadow='none'"/>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="text-xs font-semibold text-slate-400 block mb-1.5">Correo electrónico</label>
          <input id="email" type="email" placeholder="ana@clinica.com" required
            class="w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm transition-all focus:outline-none"
            style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);"
            onfocus="this.style.borderColor='rgba(45,212,191,0.5)';this.style.boxShadow='0 0 0 2px rgba(45,212,191,0.12)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.12)';this.style.boxShadow='none'"/>
        </div>

        <!-- Nombre clínica -->
        <div>
          <label class="text-xs font-semibold text-slate-400 block mb-1.5">Nombre de tu clínica</label>
          <input id="clinica-nombre" type="text" placeholder="Clínica Psicología Bienestar" required
            class="w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm transition-all focus:outline-none"
            style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);"
            onfocus="this.style.borderColor='rgba(45,212,191,0.5)';this.style.boxShadow='0 0 0 2px rgba(45,212,191,0.12)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.12)';this.style.boxShadow='none'"/>
        </div>

        <!-- Contraseña -->
        <div>
          <label class="text-xs font-semibold text-slate-400 block mb-1.5">Contraseña</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Mínimo 8 caracteres" required minlength="8"
              class="w-full px-4 py-3 pr-12 rounded-xl text-white placeholder-slate-500 text-sm transition-all focus:outline-none"
              style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);"
              onfocus="this.style.borderColor='rgba(45,212,191,0.5)';this.style.boxShadow='0 0 0 2px rgba(45,212,191,0.12)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.12)';this.style.boxShadow='none'"/>
            <button type="button" id="toggle-pwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div id="error-msg" class="hidden py-3 px-4 rounded-xl text-sm font-medium"
             style="background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);"></div>

        <!-- CTA -->
        <button type="submit" id="btn-submit"
          class="w-full py-3.5 font-bold rounded-xl transition-all active:scale-95 text-sm text-white mt-2"
          style="background:linear-gradient(135deg,#0d9488,#0f766e);box-shadow:0 4px 20px rgba(13,148,136,0.3);"
          onmouseover="this.style.background='linear-gradient(135deg,#14b8a6,#0d9488)'"
          onmouseout="this.style.background='linear-gradient(135deg,#0d9488,#0f766e)'">
          Continuar al pago seguro →
        </button>

      </form>

      <!-- Garantías -->
      <div class="mt-5 flex items-center justify-center gap-4 text-xs text-slate-500">
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm" style="color:#2dd4bf;">shield</span>
          14 días gratis
        </span>
        <span class="text-slate-700">·</span>
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm" style="color:#2dd4bf;">lock</span>
          Pago seguro
        </span>
        <span class="text-slate-700">·</span>
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm" style="color:#2dd4bf;">cancel</span>
          Cancela cuando quieras
        </span>
      </div>

    </div>

    <!-- Ya tienes cuenta -->
    <div class="mt-5 text-center text-sm text-slate-500">
      ¿Ya tienes cuenta?
      <a href="acceso_clinica.html" class="font-semibold transition-colors ml-1"
         style="color:#2dd4bf;"
         onmouseover="this.style.color='#5eead4'" onmouseout="this.style.color='#2dd4bf'">
        Inicia sesión
      </a>
    </div>

  </div>

  <script>
    const VARIANT_ID = '527d999a-b07f-4b35-8c13-22f8e5636466'; // Plan Fundadores €29/mes

    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd  = document.getElementById('password');
      const icon = document.querySelector('#toggle-pwd .material-symbols-outlined');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.textContent = 'visibility_off'; }
      else                         { pwd.type = 'password'; icon.textContent = 'visibility'; }
    });

    document.getElementById('form-registro').addEventListener('submit', (e) => {
      e.preventDefault();

      const nombre       = document.getElementById('nombre').value.trim();
      const apellido     = document.getElementById('apellido').value.trim();
      const email        = document.getElementById('email').value.trim();
      const clinicaNombre= document.getElementById('clinica-nombre').value.trim();
      const password     = document.getElementById('password').value;
      const errDiv       = document.getElementById('error-msg');
      const btn          = document.getElementById('btn-submit');

      errDiv.classList.add('hidden');

      if (!nombre || !apellido || !email || !clinicaNombre || !password) {
        errDiv.textContent = 'Por favor completa todos los campos obligatorios.';
        errDiv.classList.remove('hidden');
        return;
      }
      if (password.length < 8) {
        errDiv.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        errDiv.classList.remove('hidden');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errDiv.textContent = 'Introduce un correo electrónico válido.';
        errDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Redirigiendo al pago...';

      // Codificar la contraseña en base64 para enviarla vía custom_data
      const passwordB64 = btoa(unescape(encodeURIComponent(password)));

      const params = new URLSearchParams({
        'checkout[email]': email,
        'checkout[name]': `${nombre} ${apellido}`,
        'checkout[custom][nombre]': nombre,
        'checkout[custom][apellido]': apellido,
        'checkout[custom][clinica_nombre]': clinicaNombre,
        'checkout[custom][password_hash]': passwordB64,
      });

      const checkoutUrl = `https://serenecare.lemonsqueezy.com/checkout/buy/${VARIANT_ID}?${params.toString()}`;
      window.location.href = checkoutUrl;
    });
  </script>

</body>
</html>
