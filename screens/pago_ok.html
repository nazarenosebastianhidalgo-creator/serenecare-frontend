<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SereneCare — Pago</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; background: #020617; color: #e2e8f0;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 460px; text-align: center; background: #0a1628; border: 1px solid rgba(255,255,255,0.07);
          border-radius: 20px; padding: 40px 32px; }
  .ico { font-size: 52px; margin-bottom: 12px; }
  h1 { font-size: 22px; color: #5eead4; margin-bottom: 10px; }
  p { color: #94a3b8; font-size: 15px; line-height: 1.5; }
  .sub { color: #64748b; font-size: 13px; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="ico">✅</div>
    <h1 id="titulo">¡Pago recibido!</h1>
    <p id="texto">Tu cita queda reservada. En un momento recibirás por email el enlace de tu sesión online.</p>
    <p class="sub">Ya puedes cerrar esta ventana.</p>
  </div>
<script>
  var q = new URLSearchParams(location.search);
  if (q.get('cancelado')) {
    document.querySelector('.ico').textContent = '↩️';
    document.getElementById('titulo').textContent = 'Pago cancelado';
    document.getElementById('texto').textContent = 'No se ha realizado ningún cobro. Si quieres, puedes volver a intentarlo desde el enlace que te enviamos.';
  }
</script>
</body>
</html>
