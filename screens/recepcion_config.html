<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SereneCare — Configurar recepción</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing:border-box; }
  body { margin:0; background:#020617; font-family:'Inter',sans-serif; color:#e2e8f0; padding:32px 16px 96px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; margin:0 0 4px; color:#f1f5f9; }
  .sub { color:#94a3b8; font-size:14px; margin:0 0 24px; }
  .card { background:#0a1628; border:1px solid rgba(255,255,255,0.06); border-radius:18px; padding:22px; margin-bottom:16px; }
  label { display:block; font-size:13px; font-weight:600; color:#cbd5e1; margin:14px 0 6px; }
  input[type=text], input[type=number], select, textarea { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:11px; padding:11px 13px; color:#e2e8f0; font-family:inherit; font-size:14px; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:#2dd4bf; }
  textarea { resize:vertical; min-height:64px; }
  .hint { font-size:11px; color:#64748b; margin-top:4px; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:12px 0; }
  .row p { margin:0; font-size:14px; font-weight:600; color:#f1f5f9; }
  .toggle { width:44px; height:24px; background:rgba(255,255,255,0.1); border-radius:100px; position:relative; cursor:pointer; border:1px solid rgba(255,255,255,0.12); flex-shrink:0; transition:background .2s; }
  .toggle.on { background:rgba(45,212,191,0.35); border-color:rgba(45,212,191,0.5); }
  .toggle .th { width:18px; height:18px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:left .2s; }
  .toggle.on .th { left:22px; }
  .link { background:rgba(45,212,191,0.06); border:1px solid rgba(45,212,191,0.2); border-radius:12px; padding:14px; margin-bottom:16px; }
  .link p { margin:0 0 6px; font-size:12px; color:#94a3b8; }
  .link .u { display:flex; gap:8px; align-items:center; }
  .link input { font-size:12px; color:#5eead4; }
  .foot { position:fixed; bottom:0; left:0; right:0; padding:16px; background:rgba(2,6,23,0.9); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.06); }
  .foot .wrap { display:flex; gap:10px; }
  button.primary { flex:1; background:linear-gradient(135deg,#059669,#047857); color:#fff; font-family:'Manrope',sans-serif; font-weight:700; font-size:15px; border:none; padding:14px; border-radius:12px; cursor:pointer; }
  button.ghost { background:rgba(45,212,191,0.08); border:1px solid rgba(45,212,191,0.2); color:#5eead4; font-weight:600; padding:14px 16px; border-radius:12px; cursor:pointer; font-size:13px; }
  #msg { text-align:center; font-size:13px; margin-top:10px; min-height:18px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Tu recepción IA</h1>
    <p class="sub">Rellena tu información. La IA responderá a pacientes potenciales con estos datos y te avisará de cada consulta nueva.</p>

    <div class="link" id="linkbox" style="display:none">
      <p>🔗 Tu enlace público (compártelo o ponlo en tu web/redes):</p>
      <div class="u"><input type="text" id="enlace" readonly /><button class="ghost" onclick="copiar()">Copiar</button></div>
    </div>

    <div class="card">
      <div class="row">
        <div><p>Recepción activa</p><span class="hint">Enciéndela cuando esté lista</span></div>
        <div class="toggle" id="t-activo"><div class="th"></div></div>
      </div>
      <div class="row" style="border-top:1px solid rgba(255,255,255,0.05)">
        <div><p>Acepto pacientes nuevos</p></div>
        <div class="toggle on" id="t-nuevos"><div class="th"></div></div>
      </div>
    </div>

    <div class="card">
      <label>Mensaje de bienvenida</label>
      <textarea id="f-bienvenida" placeholder="¡Hola! Soy la recepción de la consulta. ¿En qué puedo ayudarte?"></textarea>
      <label>Tarifa</label>
      <input type="text" id="f-tarifa" placeholder="Ej: 60€ por sesión" />
      <label>Modalidad</label>
      <select id="f-modalidad">
        <option value="">—</option><option value="online">Solo online</option>
        <option value="presencial">Solo presencial</option><option value="ambas">Online y presencial</option>
      </select>
      <label>Especialidades <span class="hint">(separadas por comas)</span></label>
      <input type="text" id="f-especialidades" placeholder="Ansiedad, depresión, terapia de pareja" />
      <label>Qué tratas / a quién ayudas</label>
      <textarea id="f-trata" placeholder="Trabajo con adultos en ansiedad, autoestima y relaciones…"></textarea>
      <label>Duración de sesión (min)</label>
      <input type="number" id="f-duracion" placeholder="50" />
      <label>Idiomas <span class="hint">(separados por comas)</span></label>
      <input type="text" id="f-idiomas" placeholder="Español, inglés" />
    </div>
    <div id="msg"></div>
  </div>

  <div class="foot"><div class="wrap">
    <button class="primary" id="guardar">Guardar recepción</button>
  </div></div>

<script type="module">
  import { supabase } from '../js/supabase-client.js'
  const API = ''  // relativo
  const $ = id => document.getElementById(id)
  const arr = s => (s || '').split(',').map(x => x.trim()).filter(Boolean)
  document.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => t.classList.toggle('on')))

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { $('msg').textContent = 'Inicia sesión para configurar tu recepción.'; }
  const auth = { 'Authorization': 'Bearer ' + (session?.access_token || ''), 'Content-Type': 'application/json' }

  // Cargar config actual
  try {
    const r = await fetch(API + '/api/recepcion/mi-config', { headers: auth })
    if (r.ok) {
      const d = await r.json()
      if (d.enlace_publico) { $('enlace').value = d.enlace_publico; $('linkbox').style.display = 'block' }
      const c = d.config
      if (c) {
        $('t-activo').classList.toggle('on', !!c.activo)
        $('t-nuevos').classList.toggle('on', c.acepta_nuevos !== false)
        $('f-bienvenida').value = c.mensaje_bienvenida || ''
        $('f-tarifa').value = c.tarifa || ''
        $('f-modalidad').value = c.modalidad || ''
        $('f-especialidades').value = (c.especialidades || []).join(', ')
        $('f-trata').value = c.que_trata || ''
        $('f-duracion').value = c.duracion_min || ''
        $('f-idiomas').value = (c.idiomas || []).join(', ')
      }
    }
  } catch (e) { /* primera vez, sin config */ }

  $('guardar').addEventListener('click', async () => {
    $('guardar').disabled = true; $('msg').textContent = 'Guardando…'; $('msg').style.color = '#94a3b8'
    const body = {
      activo: $('t-activo').classList.contains('on'),
      acepta_nuevos: $('t-nuevos').classList.contains('on'),
      mensaje_bienvenida: $('f-bienvenida').value.trim() || null,
      tarifa: $('f-tarifa').value.trim() || null,
      modalidad: $('f-modalidad').value || null,
      especialidades: arr($('f-especialidades').value),
      que_trata: $('f-trata').value.trim() || null,
      duracion_min: $('f-duracion').value ? Number($('f-duracion').value) : null,
      idiomas: arr($('f-idiomas').value),
    }
    try {
      const r = await fetch(API + '/api/recepcion/config', { method: 'PUT', headers: auth, body: JSON.stringify(body) })
      const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'error')
      if (d.enlace_publico) { $('enlace').value = d.enlace_publico; $('linkbox').style.display = 'block' }
      $('msg').textContent = '✓ Recepción guardada'; $('msg').style.color = '#34d399'
    } catch (e) {
      $('msg').textContent = 'No se pudo guardar: ' + e.message; $('msg').style.color = '#f87171'
    } finally { $('guardar').disabled = false }
  })

  window.copiar = () => { $('enlace').select(); document.execCommand('copy'); $('msg').textContent = '✓ Enlace copiado'; $('msg').style.color = '#34d399' }
</script>
</body>
</html>
