<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Admin — Therapeutic Perspective</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Manrope', sans-serif; }
    .gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  </style>
</head>
<body class="min-h-screen gradient flex items-center justify-center p-6">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-white/10 border border-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-white text-4xl">admin_panel_settings</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">Super Admin</h1>
      <p class="text-slate-400 mt-1 text-sm">Therapeutic Perspective</p>
    </div>

    <!-- Card -->
    <div class="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm">
      <form id="form-login" class="space-y-5">

        <div>
          <label class="text-sm font-semibold text-slate-300 block mb-1.5">Correo electrónico</label>
          <input id="email" type="email" placeholder="admin@therapeuticperspective.com" required
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-500 focus:outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400 transition-all text-sm"/>
        </div>

        <div>
          <label class="text-sm font-semibold text-slate-300 block mb-1.5">Contraseña</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" required
              class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-500 focus:outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400 transition-all text-sm pr-12"/>
            <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" id="btn-submit"
          class="w-full py-3.5 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-all active:scale-95 text-sm mt-2">
          Iniciar sesión
        </button>

        <div class="flex items-center justify-between pt-1">
          <button type="button" id="btn-magic" class="text-xs text-sky-400 hover:text-sky-300 transition-colors">
            Entrar con código al correo
          </button>
          <a href="recuperar_password.html" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </form>

      <div id="error-msg" class="hidden mt-4 text-center py-3 px-4 rounded-xl bg-red-500/20 text-red-300 text-sm font-medium"></div>
      <div id="success-msg" class="hidden mt-4 text-center py-3 px-4 rounded-xl bg-emerald-500/20 text-emerald-300 text-sm font-medium"></div>
    </div>

    <!-- Links -->
    <div class="mt-6 flex justify-center gap-6 text-xs text-slate-500">
      <a href="../login.html" class="hover:text-slate-300 transition-colors">Acceso general</a>
    </div>

  </div>

  <script type="module">
    import { supabase } from '../js/supabase-client.js'

    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('password')
      const icon = document.querySelector('#toggle-pwd .material-symbols-outlined')
      if (pwd.type === 'password') {
        pwd.type = 'text'
        icon.textContent = 'visibility_off'
      } else {
        pwd.type = 'password'
        icon.textContent = 'visibility'
      }
    })

    document.getElementById('btn-magic').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()
      const errMsg = document.getElementById('error-msg')
      const successMsg = document.getElementById('success-msg')
      if (!email) {
        errMsg.textContent = 'Escribe tu correo primero.'
        errMsg.classList.remove('hidden')
        successMsg.classList.add('hidden')
        return
      }
      errMsg.classList.add('hidden')
      const { error } = await supabase.auth.signInWithOtp({ email, options: { shouldCreateUser: false } })
      if (error) {
        errMsg.textContent = 'No se pudo enviar el código. Verifica el correo.'
        errMsg.classList.remove('hidden')
      } else {
        successMsg.textContent = 'Código enviado. Revisa tu correo.'
        successMsg.classList.remove('hidden')
      }
    })

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('btn-submit')
      const errMsg   = document.getElementById('error-msg')

      btn.disabled = true
      btn.textContent = 'Verificando...'
      errMsg.classList.add('hidden')

      try {
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password })
        if (authError) throw new Error('Credenciales incorrectas.')

        const { data: perfil, error: perfilError } = await supabase
          .from('usuarios').select('rol').eq('id', authData.user.id).single()

        if (perfilError || !perfil) throw new Error('No se encontró tu perfil.')
        if (perfil.rol !== 'super_admin') {
          await supabase.auth.signOut()
          throw new Error('No tenés permisos de super admin.')
        }

        localStorage.setItem('tp_rol', 'super_admin')
        localStorage.setItem('tp_user_id', authData.user.id)
        localStorage.setItem('tp_email', email)

        window.location.href = '/screens/dashboard_maestro_super_admin.html'
      } catch (err) {
        errMsg.textContent = err.message
        errMsg.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Iniciar sesión'
      }
    })
  </script>
</body>
</html>
