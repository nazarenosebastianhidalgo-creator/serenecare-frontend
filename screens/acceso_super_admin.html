<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Admin — SereneCare</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Manrope', sans-serif; }
    .gradient { background: linear-gradient(135deg, #020617 0%, #0a1628 60%, #020617 100%); }
    .input-field {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: rgba(56,189,248,0.5);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.1);
    }
    .tab-active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
    .tab-inactive { color: #475569; border-bottom: 2px solid transparent; }
    .tab-inactive:hover { color: #94a3b8; }
  </style>
</head>
<body class="min-h-screen gradient flex items-center justify-center p-6">

  <div class="fixed top-0 right-0 w-96 h-96 rounded-full opacity-10 pointer-events-none" style="background:radial-gradient(circle,rgba(56,189,248,0.4) 0%,transparent 70%);"></div>
  <div class="fixed bottom-0 left-0 w-80 h-80 rounded-full opacity-10 pointer-events-none" style="background:radial-gradient(circle,rgba(99,102,241,0.3) 0%,transparent 70%);"></div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-white/10 border border-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-sky-400 text-4xl">admin_panel_settings</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">Super Admin</h1>
      <p class="text-slate-400 mt-1 text-sm">SereneCare</p>
    </div>

    <!-- Card -->
    <div class="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm">

      <!-- Tabs -->
      <div class="flex gap-6 mb-6 border-b border-white/10 pb-0">
        <button id="tab-pwd" class="tab-active pb-3 text-sm font-semibold transition-all" onclick="switchTab('pwd')">
          Contraseña
        </button>
        <button id="tab-magic" class="tab-inactive pb-3 text-sm font-semibold transition-all" onclick="switchTab('magic')">
          Código al correo
        </button>
      </div>

      <!-- Panel: Contraseña -->
      <div id="panel-pwd">
        <form id="form-pwd" class="space-y-5">
          <div>
            <label class="text-sm font-semibold text-slate-300 block mb-1.5">Correo electrónico</label>
            <input id="email-pwd" type="email" placeholder="admin@serenecare.com" required
              class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm"/>
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-300 block mb-1.5">Contraseña</label>
            <div class="relative">
              <input id="password" type="password" placeholder="••••••••" required
                class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm pr-12"/>
              <button type="button" id="toggle-pwd"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-xl">visibility</span>
              </button>
            </div>
          </div>
          <button type="submit" id="btn-pwd"
            class="w-full py-3.5 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-all active:scale-95 text-sm">
            Iniciar sesión
          </button>
          <div class="text-right">
            <a href="recuperar_password.html" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </form>
      </div>

      <!-- Panel: Código OTP -->
      <div id="panel-magic" class="hidden">

        <!-- Estado: formulario -->
        <div id="magic-form" class="space-y-5">
          <p class="text-sm text-slate-400">Te enviamos un enlace de acceso directo a tu correo. Sin necesidad de contraseña.</p>
          <div>
            <label class="text-sm font-semibold text-slate-300 block mb-1.5">Correo electrónico</label>
            <input id="email-magic" type="email" placeholder="admin@serenecare.com"
              class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm"/>
          </div>
          <button id="btn-magic"
            class="w-full py-3.5 bg-indigo-500 hover:bg-indigo-400 text-white font-bold rounded-xl transition-all active:scale-95 text-sm">
            Enviar código
          </button>
        </div>

        <!-- Estado: éxito -->
        <div id="magic-success" class="hidden text-center py-4">
          <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);">
            <span class="material-symbols-outlined text-indigo-400 text-2xl" style="font-variation-settings:'FILL' 1;">mark_email_read</span>
          </div>
          <p class="text-white font-bold mb-1">Revisa tu correo</p>
          <p class="text-slate-400 text-sm mb-5">Enviamos el enlace a <span id="magic-email-sent" class="text-white font-semibold"></span></p>
          <button id="btn-magic-retry" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">
            Reenviar enlace
          </button>
        </div>

      </div>

      <!-- Mensajes de error -->
      <div id="error-msg" class="hidden mt-4 text-center py-3 px-4 rounded-xl bg-red-500/20 text-red-300 text-sm font-medium"></div>

    </div>

    <!-- Links -->
    <div class="mt-6 flex justify-center gap-6 text-xs text-slate-500">
      <a href="../index.html" class="hover:text-slate-300 transition-colors">Volver al portal</a>
    </div>

  </div>

  <script type="module">
    import { supabase } from '../js/supabase-client.js'

    // ── Manejo de callback magic link (cuando el usuario hace clic en el email) ──
    const hash = window.location.hash
    if (hash.includes('access_token') || hash.includes('type=magiclink')) {
      const { data, error } = await supabase.auth.getSession()
      if (!error && data.session) {
        const uid = data.session.user.id
        const { data: perfil } = await supabase.from('usuarios').select('rol,nombre').eq('id', uid).single()
        if (perfil?.rol === 'super_admin') {
          localStorage.setItem('tp_rol', 'super_admin')
          localStorage.setItem('tp_user_id', uid)
          localStorage.setItem('tp_email', data.session.user.email)
          localStorage.setItem('tp_nombre', perfil.nombre || 'Super Admin')
          window.location.replace('/screens/dashboard_maestro_super_admin.html')
        } else {
          await supabase.auth.signOut()
          mostrarError('Esta cuenta no tiene permisos de super admin.')
        }
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    window.switchTab = function(tab) {
      const isPwd = tab === 'pwd'
      document.getElementById('panel-pwd').classList.toggle('hidden', !isPwd)
      document.getElementById('panel-magic').classList.toggle('hidden', isPwd)
      document.getElementById('tab-pwd').className = isPwd ? 'tab-active pb-3 text-sm font-semibold transition-all' : 'tab-inactive pb-3 text-sm font-semibold transition-all'
      document.getElementById('tab-magic').className = isPwd ? 'tab-inactive pb-3 text-sm font-semibold transition-all' : 'tab-active pb-3 text-sm font-semibold transition-all'
      ocultarError()
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function mostrarError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.classList.remove('hidden')
    }
    function ocultarError() {
      document.getElementById('error-msg').classList.add('hidden')
    }

    // ── Toggle contraseña visible ─────────────────────────────────────────────
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd  = document.getElementById('password')
      const icon = document.querySelector('#toggle-pwd .material-symbols-outlined')
      pwd.type   = pwd.type === 'password' ? 'text' : 'password'
      icon.textContent = pwd.type === 'password' ? 'visibility' : 'visibility_off'
    })

    // ── Login con contraseña ──────────────────────────────────────────────────
    document.getElementById('form-pwd').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email-pwd').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('btn-pwd')
      ocultarError()
      btn.disabled    = true
      btn.textContent = 'Verificando...'

      try {
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password })
        if (authError) throw new Error('Credenciales incorrectas.')

        const { data: perfil, error: perfilError } = await supabase
          .from('usuarios').select('rol,nombre').eq('id', authData.user.id).single()

        if (perfilError || !perfil) throw new Error('No se encontró tu perfil.')
        if (perfil.rol !== 'super_admin') {
          await supabase.auth.signOut()
          throw new Error('Esta cuenta no tiene permisos de super admin.')
        }

        localStorage.setItem('tp_rol', 'super_admin')
        localStorage.setItem('tp_user_id', authData.user.id)
        localStorage.setItem('tp_email', email)
        localStorage.setItem('tp_nombre', perfil.nombre || 'Super Admin')

        window.location.href = '/screens/dashboard_maestro_super_admin.html'
      } catch (err) {
        mostrarError(err.message)
        btn.disabled    = false
        btn.textContent = 'Iniciar sesión'
      }
    })

    // ── Login con magic link ──────────────────────────────────────────────────
    document.getElementById('btn-magic').addEventListener('click', async () => {
      const email = document.getElementById('email-magic').value.trim()
      ocultarError()
      if (!email) { mostrarError('Escribe tu correo primero.'); return }

      const btn = document.getElementById('btn-magic')
      btn.disabled    = true
      btn.textContent = 'Enviando...'

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: false,
          emailRedirectTo: window.location.origin + '/screens/acceso_super_admin.html'
        }
      })

      if (error) {
        mostrarError(error.message || 'No se pudo enviar el código. Verifica el correo.')
        btn.disabled    = false
        btn.textContent = 'Enviar código'
      } else {
        document.getElementById('magic-email-sent').textContent = email
        document.getElementById('magic-form').classList.add('hidden')
        document.getElementById('magic-success').classList.remove('hidden')
      }
    })

    document.getElementById('btn-magic-retry').addEventListener('click', () => {
      document.getElementById('magic-success').classList.add('hidden')
      document.getElementById('magic-form').classList.remove('hidden')
      const btn = document.getElementById('btn-magic')
      btn.disabled    = false
      btn.textContent = 'Enviar código'
    })
  </script>
</body>
</html>
