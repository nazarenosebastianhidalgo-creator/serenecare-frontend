<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recuperar contraseña — SereneCare</title>
  <link rel="stylesheet" href="/css/tailwind.css">
  <script>window.tailwind=window.tailwind||{};</script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Manrope', sans-serif; }
    .gradient { background: linear-gradient(135deg, #020617 0%, #0a1628 60%, #020617 100%); }
    .input-base {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-base:focus {
      outline: none;
      border-color: rgba(45,212,191,0.5);
      box-shadow: 0 0 0 2px rgba(45,212,191,0.12);
    }
  </style>
</head>
<body class="min-h-screen gradient flex items-center justify-center p-6">

  <div class="fixed top-0 right-0 w-96 h-96 rounded-full opacity-10 pointer-events-none" style="background:radial-gradient(circle,rgba(56,189,248,0.3) 0%,transparent 70%);"></div>
  <div class="fixed bottom-0 left-0 w-80 h-80 rounded-full opacity-10 pointer-events-none" style="background:radial-gradient(circle,rgba(20,184,166,0.3) 0%,transparent 70%);"></div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-white/10 border border-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-sky-400 text-3xl">lock_reset</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white">Recuperar acceso</h1>
      <p class="text-slate-400 mt-1 text-sm">Te enviamos un enlace a tu correo para restablecer la contraseña</p>
    </div>

    <!-- Card: formulario inicial -->
    <div id="card-form" class="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm">
      <form id="form-recovery" class="space-y-5">

        <div>
          <label class="text-sm font-semibold text-slate-300 block mb-1.5">Correo electrónico</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
            <input id="email" type="email" placeholder="tu@correo.com" required
              class="input-base w-full pl-10 pr-4 py-3 rounded-xl text-white placeholder-slate-500 text-sm"/>
          </div>
        </div>

        <button type="submit" id="btn-submit"
          class="w-full py-3.5 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-all active:scale-95 text-sm flex items-center justify-center gap-2">
          <span>Enviar enlace</span>
          <span class="material-symbols-outlined text-base">arrow_forward</span>
        </button>

        <div id="error-msg" class="hidden text-center py-3 px-4 rounded-xl bg-red-500/20 text-red-300 text-sm font-medium"></div>

      </form>
    </div>

    <!-- Card: éxito (oculto al inicio) -->
    <div id="card-success" class="hidden bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm text-center">
      <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5" style="background:rgba(20,184,166,0.15);border:1px solid rgba(20,184,166,0.3);">
        <span class="material-symbols-outlined text-teal-400 text-3xl" style="font-variation-settings:'FILL' 1;">mark_email_read</span>
      </div>
      <h2 class="text-xl font-extrabold text-white mb-2">Revisa tu correo</h2>
      <p class="text-slate-400 text-sm mb-6">Te enviamos el enlace a <span id="email-sent" class="text-white font-semibold"></span></p>

      <div class="space-y-3 text-left mb-6">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5">
          <span class="material-symbols-outlined text-sky-400 text-lg">schedule</span>
          <p class="text-sm text-slate-400">El enlace expira en 30 minutos</p>
        </div>
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5">
          <span class="material-symbols-outlined text-sky-400 text-lg">folder</span>
          <p class="text-sm text-slate-400">Revisa también tu carpeta de spam</p>
        </div>
      </div>

      <button id="btn-reintentar" class="text-sm text-sky-400 hover:text-sky-300 transition-colors">
        Reenviar enlace
      </button>
    </div>

    <!-- Links -->
    <div class="mt-6 flex justify-center gap-6 text-xs text-slate-500">
      <a href="acceso_super_admin.html" class="hover:text-slate-300 transition-colors flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Volver al inicio de sesión
      </a>
    </div>

  </div>

  <script type="module">
    import { supabase } from '../js/supabase-client.js'

    const form       = document.getElementById('form-recovery')
    const btnSubmit  = document.getElementById('btn-submit')
    const errMsg     = document.getElementById('error-msg')
    const cardForm   = document.getElementById('card-form')
    const cardSuccess = document.getElementById('card-success')
    const emailSent  = document.getElementById('email-sent')
    const btnReint   = document.getElementById('btn-reintentar')

    async function enviar(email) {
      btnSubmit.disabled = true
      btnSubmit.innerHTML = '<span>Enviando...</span>'
      errMsg.classList.add('hidden')

      try {
        const r = await fetch('https://serenecare-backend-production.up.railway.app/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        })
        // Siempre mostramos éxito para no revelar si el email existe
        emailSent.textContent = email
        cardForm.classList.add('hidden')
        cardSuccess.classList.remove('hidden')
      } catch (err) {
        errMsg.textContent = 'No se pudo enviar el correo. Intentá de nuevo.'
        errMsg.classList.remove('hidden')
        btnSubmit.disabled = false
        btnSubmit.innerHTML = '<span>Enviar enlace</span><span class="material-symbols-outlined text-base">arrow_forward</span>'
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      await enviar(document.getElementById('email').value.trim())
    })

    btnReint.addEventListener('click', () => {
      cardSuccess.classList.add('hidden')
      cardForm.classList.remove('hidden')
      btnSubmit.disabled = false
      btnSubmit.innerHTML = '<span>Enviar enlace</span><span class="material-symbols-outlined text-base">arrow_forward</span>'
    })
  </script>
</body>
</html>
